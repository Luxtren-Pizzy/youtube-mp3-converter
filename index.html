<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube to MP3 - Konverter Audio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            font-size: 1.8rem;
            text-align: center;
            color: white;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .sub {
            text-align: center;
            color: #ccc;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .input-group {
            background: rgba(0,0,0,0.4);
            border-radius: 3rem;
            display: flex;
            align-items: center;
            padding: 0.3rem 0.3rem 0.3rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .input-group i {
            color: #ff0000;
            font-size: 1.3rem;
        }
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .input-group input::placeholder {
            color: #aaa;
        }
        button {
            width: 100%;
            margin-top: 1.5rem;
            background: linear-gradient(95deg, #ff0000, #cc0000);
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border-radius: 3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #ff1a1a, #e60000);
        }
        .status {
            margin-top: 1.5rem;
            background: rgba(0,0,0,0.4);
            border-radius: 1rem;
            padding: 1rem;
            display: none;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #ff0000;
        }
        .result {
            margin-top: 1.5rem;
            background: rgba(0,0,0,0.4);
            border-radius: 1rem;
            padding: 1rem;
            display: none;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .download-btn {
            width: auto;
            margin: 0;
            padding: 0.7rem 1.5rem;
            background: #2ecc71;
            margin-top: 0;
        }
        .download-btn:hover {
            background: #27ae60;
        }
        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #aaa;
        }
        @media (max-width: 500px) {
            .card { padding: 1.5rem; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1><i class="fab fa-youtube"></i> YouTube to MP3</h1>
    <div class="sub">Konversi video YouTube ke MP3 dengan mudah</div>

    <div class="input-group">
        <i class="fab fa-youtube"></i>
        <input type="text" id="youtubeUrl" placeholder="Tempel link YouTube... (contoh: https://youtu.be/... atau https://www.youtube.com/watch?v=...)">
    </div>

    <button id="convertBtn"><i class="fas fa-music"></i> <span>Konversi ke MP3</span></button>

    <div id="statusArea" class="status">
        <i class="fas fa-circle-info"></i>
        <span id="statusMsg"></span>
    </div>

    <div id="resultArea" class="result"></div>
    <div class="footer">Gunakan untuk konten pribadi. Pastikan memiliki hak untuk mengunduh.</div>
</div>

<script>
    const urlInput = document.getElementById('youtubeUrl');
    const convertBtn = document.getElementById('convertBtn');
    const btnText = document.querySelector('#convertBtn span');
    const statusArea = document.getElementById('statusArea');
    const statusMsg = document.getElementById('statusMsg');
    const resultArea = document.getElementById('resultArea');

    function showStatus(message, isError = false) {
        statusArea.style.display = 'flex';
        statusMsg.innerText = message;
        statusArea.style.borderLeftColor = isError ? '#ff4444' : '#2ecc71';
        if (!isError) {
            statusArea.style.borderLeftColor = '#2ecc71';
        }
    }

    function hideStatus() {
        statusArea.style.display = 'none';
    }

    function showLoading() {
        convertBtn.disabled = true;
        btnText.innerHTML = '<div class="loader"></div> Memproses...';
        hideStatus();
        resultArea.style.display = 'none';
        resultArea.innerHTML = '';
    }

    function resetButton() {
        convertBtn.disabled = false;
        btnText.innerHTML = 'Konversi ke MP3';
    }

    // Validasi URL YouTube
    function getVideoId(url) {
        const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/;
        const match = url.match(regex);
        return match ? match[1] : null;
    }

    // Fungsi konversi menggunakan API yang lebih stabil
    async function convertToMp3(videoUrl) {
        const videoId = getVideoId(videoUrl);
        if (!videoId) throw new Error('URL YouTube tidak valid!');

        // Menggunakan API dari zyro.com (cors-enabled)
        const apiUrl = `https://api.zyro.com/v1/tools/youtube-to-mp3?videoId=${videoId}`;
        
        // Fallback: pakai endpoint lain jika perlu
        const proxyUrl = `https://cors-anywhere.herokuapp.com/https://youtube-mp3-download-api.vercel.app/api?url=${encodeURIComponent(videoUrl)}`;
        
        // Coba endpoint yang lebih reliable
        try {
            // Endpoint publik dari savemedia (cors aman)
            const response = await fetch(`https://savemedia.app/api/convert?url=${encodeURIComponent(videoUrl)}`, {
                headers: { 'Accept': 'application/json' }
            });
            
            if (response.ok) {
                const data = await response.json();
                if (data.downloadUrl) {
                    return {
                        downloadUrl: data.downloadUrl,
                        title: data.title || 'Audio YouTube',
                        filename: `${data.title || 'youtube_audio'}.mp3`
                    };
                }
            }
            throw new Error('Coba metode lain');
        } catch (e) {
            // Endpoint cadangan
            const backupApi = `https://p.oceansaver.in/ytmp3?url=${encodeURIComponent(videoUrl)}`;
            const backupResponse = await fetch(backupApi);
            if (backupResponse.ok) {
                const blob = await backupResponse.blob();
                const downloadUrl = URL.createObjectURL(blob);
                return {
                    downloadUrl: downloadUrl,
                    title: 'youtube_audio',
                    filename: `youtube_${videoId}.mp3`
                };
            }
            throw new Error('Layanan konversi sedang sibuk. Coba lagi nanti.');
        }
    }

    convertBtn.addEventListener('click', async () => {
        const url = urlInput.value.trim();
        if (!url) {
            showStatus('❌ Masukkan link YouTube terlebih dahulu!', true);
            return;
        }

        if (!getVideoId(url)) {
            showStatus('❌ URL YouTube tidak valid. Periksa kembali linknya!', true);
            return;
        }

        showLoading();

        try {
            const result = await convertToMp3(url);
            
            resetButton();
            showStatus('✅ Audio siap diunduh! Klik tombol di bawah.', false);
            
            resultArea.style.display = 'flex';
            resultArea.innerHTML = `
                <div style="display: flex; align-items: center; gap: 15px; flex:1;">
                    <i class="fas fa-file-audio" style="font-size: 2rem; color: #2ecc71;"></i>
                    <div>
                        <strong>${escapeHtml(result.title.substring(0, 50))}</strong><br>
                        <small>Format: MP3 | Kualitas: High</small>
                    </div>
                </div>
                <button id="downloadFinalBtn" class="download-btn"><i class="fas fa-download"></i> Unduh MP3</button>
            `;
            
            const downloadBtn = document.getElementById('downloadFinalBtn');
            downloadBtn.addEventListener('click', () => {
                const link = document.createElement('a');
                link.href = result.downloadUrl;
                link.download = result.filename;
                link.click();
            });
            
        } catch (error) {
            console.error(error);
            resetButton();
            showStatus('⚠️ Gagal konversi: ' + error.message + '. Coba video lain atau ulangi nanti.', true);
            resultArea.style.display = 'none';
        }
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Enter key
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') convertBtn.click();
    });
</script>
</body>
</html>
